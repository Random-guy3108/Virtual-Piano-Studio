<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Studio Piano</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="startOverlay">
        <div>
            <h2 style="font-size: 2rem; margin-bottom: 1rem;">Virtual Studio Piano</h2>
            <p style="color: #8b949e; margin-bottom: 2rem;">Click anywhere to initialize audio</p>
            <button id="startBtn"
                style="background: var(--accent-color); color: white; padding: 15px 40px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer;">ENTER
                STUDIO</button>
        </div>
    </div>

    <div class="app-container">
        <header>
            <h1>STUDIO <span style="color: var(--text-color)">PIANO</span></h1>
            <p>High Fidelity Digital Audio Workstation</p>
        </header>

        <div class="piano-outer-container">
            <div class="piano-interface">
                <div class="interface-left" style="gap: 40px;">
                    <div class="control-group volume-knob-group">
                        <label>VOLUME</label>
                        <div class="knob-container" id="volKnobContainer">
                            <div class="knob" id="volKnob">
                                <div class="knob-indicator"></div>
                            </div>
                        </div>
                    </div>

                    <div class="control-group sequencer-group">
                        <label>SEQUENCER</label>
                        <div class="seq-buttons">
                            <button id="recordBtn" class="seq-btn record" title="Record">⬤</button>
                            <button id="playBtn" class="seq-btn play" title="Play">▶</button>
                            <button id="stopSeqBtn" class="seq-btn stop" title="Stop">■</button>
                        </div>
                    </div>

                </div>

                <div class="interface-center">
                    <div class="lcd-screen" id="instrumentToggle">
                        <div class="lcd-label">INSTRUMENT</div>
                        <div class="lcd-value" id="currentInstrumentName">GRAND PIANO</div>
                    </div>
                </div>

                <div class="interface-right">
                    <div class="control-group">
                        <label for="showLabels">
                            <input type="checkbox" id="showLabels" checked> SHOW LABELS
                        </label>
                    </div>
                </div>
            </div>

            <div class="piano-scroll">
                <div class="piano" id="piano">
                    <!-- Keys generated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Instrument Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Select Instrument</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="instrument-list" id="instrumentList">
                <!-- Buttons generated by JS -->
            </div>
        </div>
    </div>

    <script src="instruments.js"></script>
    <script src="script.js"></script>
</body>

</html>
